      interval: 30s
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          # TODO chapitre 6 : compléter la requête Prometheus.
          query: |
            up
      # TODO chapitre 6 : compléter successCondition et failureCondition.
