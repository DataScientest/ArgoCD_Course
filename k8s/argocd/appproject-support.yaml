apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: support-priority-project
  namespace: argocd
spec:
  description: Projet ArgoCD pour l'API de priorisation de tickets support
  sourceRepos:
    - https://github.com/DataScientest/ArgoCD_Course.git
  destinations:
    - namespace: support-priority
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
