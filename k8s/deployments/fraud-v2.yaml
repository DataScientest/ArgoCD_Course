apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-v2
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-scoring
      track: canary
  template:
    metadata:
      labels:
        app: fraud-scoring
        track: canary
    spec:
      containers:
        - name: fraud-api
          image: fraud-scoring:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_VERSION
              value: v2
