apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fraud-bluegreen
  namespace: fraud-detection
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-scoring
  template:
    metadata:
      labels:
        app: fraud-scoring
    spec:
      containers:
        - name: fraud-api
          image: fraud-scoring:v2
          ports:
            - containerPort: 8000
  strategy:
    blueGreen:
      # TODO chapitre 5 : compléter activeService et previewService.
      autoPromotionEnabled: false
